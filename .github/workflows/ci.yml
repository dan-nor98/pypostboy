name: CI

on:
  push:
  pull_request:

jobs:
  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests/backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci --include=optional

      - name: Build Docker image
        run: docker build -t pypostboy-ci .

      - name: Validate development Compose config
        run: docker compose -f docker-compose.dev.yml config

      - name: Validate production Compose config
        env:
          POSTBOY_DATABASE_URL: postgresql://postboy:dummy-password@db:5432/postboy
          POSTBOY_SECRET_KEY: dummy-ci-secret-key-not-for-production
          POSTGRES_PASSWORD: dummy-postgres-password
          ALLOWED_HOSTS: localhost,127.0.0.1
          CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8080
          CSRF_TRUSTED_ORIGINS: http://localhost:3000,http://localhost:8080
        run: docker compose -f docker-compose.yml config

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend
        run: npm run frontend:build

      - name: Verify frontend build artifact
        run: npm run frontend:check
