name: CI

on:
  push:
  pull_request:

jobs:
  dashboard-build:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        run: pytest tests/backend

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dashboard dependencies
        run: npm run frontend:install

      - name: Build dashboard before serving
        run: npm run frontend:build

      - name: Verify dashboard artifact exists when linked
        run: npm run frontend:check

      - name: Run IAM browser auth session tests
        run: npm run test:iam-browser
