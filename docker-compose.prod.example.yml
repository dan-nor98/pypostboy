# Example production override for deployments that terminate TLS at a reverse proxy
# in front of this Compose stack. Copy this file, adjust hostnames/origins, and run:
# docker compose -f docker-compose.yml -f docker-compose.prod.example.yml up -d --build
services:
  app:
    environment:
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?Set to your production hostnames, for example api.example.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set to HTTPS origins, for example https://app.example.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:?Set to HTTPS origins, for example https://app.example.com}
      SESSION_COOKIE_SECURE: "true"
      CSRF_COOKIE_SECURE: "true"

  nginx:
    ports:
      # Keep the application on loopback when another host-level reverse proxy
      # handles public HTTPS traffic and forwards to this stack over HTTP.
      # Match docker-compose.yml so production examples do not publish plain HTTP.
      - "127.0.0.1:8080:80"
