services:
  app:
    build: .
    environment:
      POSTBOY_CONFIG: development
      POSTBOY_DB_PATH: /data/postboy-data.db
      POSTBOY_SECRET_KEY: ${POSTBOY_SECRET_KEY:-postboy-dev-secret-key}
      PORT: 3001
    expose:
      - "3001"
    volumes:
      - postboy-sqlite-data:/data

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z

volumes:
  postboy-sqlite-data:
