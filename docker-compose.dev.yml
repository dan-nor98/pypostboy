services:
  app:
    build: .
    environment:
      POSTBOY_CONFIG: development
      POSTBOY_DB_PATH: /data/postboy-data.db
      POSTBOY_SECRET_KEY: ${POSTBOY_SECRET_KEY:-postboy-dev-secret-key}
      PORT: 3001
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-true}
    expose:
      - "3001"
    volumes:
      - postboy-sqlite-data:/data

  nginx:
    image: nginx:alpine
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro,Z

volumes:
  postboy-sqlite-data:
